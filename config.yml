# Infraestructura Core
gateway:
  env:
    OUTPUT_QUEUE_NAME: currency_filter_input_queue
    CLIENT_EXCHANGE_NAME: client_results_exchange
  port: 8080
  
rabbitmq:
  amqp_port: 5672
  management_port: 15672

# Nodos de la aplicación
services:
  client:
    count: 1
    datasets_dir: ./datasets
    output_dir: ./outputs     
    
  currency_filter:
    count: 1
    worker_type: CURRENCY_FILTER
    env:
      INPUT_QUEUE_NAME: currency_filter_input_queue
      MICROTRANSACTION_FILTER_QUEUE_NAME: microtransaction_filter_input_queue
      BANK_ROUTER_QUEUE_NAME: bank_router_input_queue
      PERIOD_FILTER_QUEUE_NAME: period_filter_input_queue
      CURRENCY_TO_FILTER: "US Dollar"

  microtransaction_filter:
    count: 1
    worker_type: AMOUNT_FILTER
    env:
      INPUT_QUEUE_NAME: microtransaction_filter_input_queue
      OUTPUT_QUEUE_NAME: microtransaction_join_input_queue
      AMOUNT_TO_FILTER: 50

  microtransaction_join:
    count: 1
    worker_type: MICROTRANSACTION_JOIN
    env:
      INPUT_QUEUE_NAME: microtransaction_join_input_queue
      CLIENT_EXCHANGE_NAME: client_results_exchange
      MAX_BATCH_TRANSACTIONS: 100
      MAX_BATCH_BYTES: 8000
    
  bank_router:
    count: 1
    worker_type: BANK_ROUTER
    env:
      INPUT_QUEUE_NAME: bank_router_input_queue
      MAX_BANK_EXCHANGE_NAME: max_bank_input_exchange
      MAX_BANK_WORKER_AMOUNT: 1

  max_bank:
    count: 1
    worker_type: MAX_BANK
    env:
      INPUT_EXCHANGE_NAME: max_bank_input_exchange
      OUTPUT_QUEUE_NAME: max_bank_join_input
      MAX_BATCH_WEIGHT: 8000 

  max_bank_join:
    count: 1
    worker_type: MAX_BANK_JOIN
    env:
      INPUT_QUEUE_NAME: max_bank_join_input
      CLIENT_EXCHANGE_NAME: client_results_exchange
    

  period_filter:
    count: 0
    worker_type: PERIOD_FILTER
    env:
      USD_INPUT_QUEUE_NAME: period_filter_input_queue
      RAW_INPUT_QUEUE_NAME: raw_transactions
      ORIGIN_DESTINATION_ROUTER_QUEUE_NAME: origin_destination_router
      PAYMENT_TYPE_FILTER_QUEUE_NAME: payment_type_filter
      AVG_BY_TYPE_PERIOD_1_QUEUE_NAME: avg_by_type_p1
      AVG_BY_TYPE_PERIOD_2_QUEUE_NAME: avg_by_type_p2
      AVG_BY_TYPE_PERIOD_1_START: "2024-01-01T00:00:00Z"
      AVG_BY_TYPE_PERIOD_1_END: "2024-01-08T23:59:59Z"
      AVG_BY_TYPE_PERIOD_2_START: "2024-01-09T00:00:00Z"
      AVG_BY_TYPE_PERIOD_2_END: "2024-01-17T23:59:59Z"
      SCATTER_GATHER_PERIOD_START: "2024-01-01T00:00:00Z"
      SCATTER_GATHER_PERIOD_END: "2024-01-17T23:59:59Z"
      PAYMENT_TYPE_PERIOD_START: "2024-01-01T00:00:00Z"
      PAYMENT_TYPE_PERIOD_END: "2024-01-17T23:59:59Z"

  payment_type_router:
    count: 1
    worker_type: PAYMENT_TYPE_ROUTER
    env:
      INPUT_QUEUE_NAME: payment_type_router_input
      PAYMENT_TYPE_EXCHANGE_NAME: payment_type_exchange

  origin_destination_router:
    count: 0
    worker_type: ORIGIN_DESTINATION_ROUTER

    env:
      INPUT_QUEUE_NAME: origin_destination_router

      GROUP_BY_ORIGIN_EXCHANGE_NAME: group_by_origin
      GROUP_BY_DESTINATION_EXCHANGE_NAME: group_by_destination

      GROUP_BY_ORIGIN_WORKER_AMOUNT: 1
      GROUP_BY_DESTINATION_WORKER_AMOUNT: 1
  
  group_by_origin:
    count: 0
    worker_type: GROUP_BY_ORIGIN

    env:
      INPUT_EXCHANGE_NAME: group_by_origin
      OUTPUT_QUEUE_NAME: grouped_origin_accounts

      MAX_BATCH_WEIGHT: 8000

networks:
  money_laundering_network:
    driver: bridge
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 15672:15672
    - 5672:5672
    networks:
    - money_laundering_network
  gateway:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    container_name: gateway
    environment:
    - SERVER_HOST=0.0.0.0
    - SERVER_PORT=8080
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - OUTPUT_QUEUE_NAME=currency_filter_input_queue
    - CLIENT_EXCHANGE_NAME=client_results_exchange
    - RAW_DATA_QUEUE_NAME=raw_transactions
    - MAX_BANK_ROUTER_QUEUE_NAME=bank_router_input_queue
    - LOG_LEVEL=debug
    - CONVERTER_JOIN_AMOUNT=2
    ports:
    - 8080:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  client_0:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: client_0
    environment:
    - ID=0
    - SERVER_HOST=gateway
    - SERVER_PORT=8080
    - INPUT_FILE_TRANSACTIONS=/datasets/client_0_transactions.csv
    - INPUT_FILE_ACCOUNTS=/datasets/client_0_accounts.csv
    - OUTPUT_DIR=/outputs
    - MAX_BATCH_WEIGHT=1000000
    - LOG_LEVEL=debug
    volumes:
    - ./datasets:/datasets
    - ./outputs/client_0:/outputs
    depends_on:
      gateway:
        condition: service_started
      fault_hypervisor:
        condition: service_healthy
    networks:
    - money_laundering_network
  fault_hypervisor:
    build:
      context: .
      dockerfile: cmd/fault_hypervisor/Dockerfile
    container_name: fault_hypervisor
    privileged: true
    environment:
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - HEARTBEAT_QUEUE_NAME=heartbeat_queue
    - CHECK_INTERVAL_SECONDS=5
    - HEARTBEAT_TIMEOUT_SECONDS=15
    healthcheck:
      test:
      - CMD
      - test
      - -f
      - /tmp/ready
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 10s
    volumes:
    - ./Compose.yml:/app/Compose.yml:ro
    - ./config.yml:/app/config.yml:ro
    - .:/workspace:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network

networks:
  money_laundering_network:
    driver: bridge
services:
  rabbitmq:
    image: rabbitmq:3-management
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 15672:15672
    - 5672:5672
    networks:
    - money_laundering_network
  gateway:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    container_name: gateway
    environment:
    - SERVER_HOST=0.0.0.0
    - SERVER_PORT=8080
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - OUTPUT_QUEUE_NAME=currency_filter_input_queue
    - CLIENT_EXCHANGE_NAME=client_results_exchange
    ports:
    - 8080:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  client_0:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: client_0
    environment:
    - ID=0
    - SERVER_HOST=gateway
    - SERVER_PORT=8080
    - INPUT_FILE_TRANSACTIONS=/datasets/client_0_transactions.csv
    - INPUT_FILE_ACCOUNTS=/datasets/client_0_accounts.csv
    - OUTPUT_DIR=/outputs
    volumes:
    - ./datasets:/datasets
    - ./outputs/client_0:/outputs
    depends_on:
    - gateway
    networks:
    - money_laundering_network
  currency_filter_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: currency_filter_0
    environment:
    - ID=0
    - WORKER_TYPE=CURRENCY_FILTER
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - INPUT_QUEUE_NAME=currency_filter_input_queue
    - MICROTRANSACTION_FILTER_QUEUE_NAME=microtransaction_filter_input_queue
    - BANK_ROUTER_QUEUE_NAME=bank_router_input_queue
    - PERIOD_FILTER_QUEUE_NAME=period_filter_input_queue
    - CURRENCY_TO_FILTER=US Dollar
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  microtransaction_filter_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: microtransaction_filter_0
    environment:
    - ID=0
    - WORKER_TYPE=AMOUNT_FILTER
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - INPUT_QUEUE_NAME=microtransaction_filter_input_queue
    - OUTPUT_QUEUE_NAME=microtransaction_join_input_queue
    - AMOUNT_TO_FILTER=50
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  microtransaction_join_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: microtransaction_join_0
    environment:
    - ID=0
    - WORKER_TYPE=MICROTRANSACTION_JOIN
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - INPUT_QUEUE_NAME=microtransaction_join_input_queue
    - CLIENT_EXCHANGE_NAME=client_results_exchange
    - MAX_BATCH_TRANSACTIONS=100
    - MAX_BATCH_BYTES=8000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  bank_router_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: bank_router_0
    environment:
    - ID=0
    - WORKER_TYPE=BANK_ROUTER
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - INPUT_QUEUE_NAME=bank_router_input_queue
    - MAX_BANK_EXCHANGE_NAME=max_bank_input_exchange
    - MAX_BANK_WORKER_AMOUNT=1
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  max_bank_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: max_bank_0
    environment:
    - ID=0
    - WORKER_TYPE=MAX_BANK
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - INPUT_EXCHANGE_NAME=max_bank_input_exchange
    - OUTPUT_QUEUE_NAME=max_bank_join_input
    - MAX_BATCH_WEIGHT=8000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  max_bank_join_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: max_bank_join_0
    environment:
    - ID=0
    - WORKER_TYPE=MAX_BANK_JOIN
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - INPUT_QUEUE_NAME=max_bank_join_input
    - CLIENT_EXCHANGE_NAME=client_results_exchange
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  period_filter_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: period_filter_0
    environment:
    - ID=0
    - WORKER_TYPE=PERIOD_FILTER
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - USD_INPUT_QUEUE_NAME=period_filter_input_queue
    - RAW_INPUT_QUEUE_NAME=raw_transactions
    - ORIGIN_DESTINATION_ROUTER_QUEUE_NAME=origin_destination_router
    - PAYMENT_TYPE_FILTER_QUEUE_NAME=payment_type_filter
    - AVG_BY_TYPE_PERIOD_1_QUEUE_NAME=avg_by_type_p1
    - AVG_BY_TYPE_PERIOD_2_QUEUE_NAME=avg_by_type_p2
    - AVG_BY_TYPE_PERIOD_1_START=2024-01-01T00:00:00Z
    - AVG_BY_TYPE_PERIOD_1_END=2024-01-08T23:59:59Z
    - AVG_BY_TYPE_PERIOD_2_START=2024-01-09T00:00:00Z
    - AVG_BY_TYPE_PERIOD_2_END=2024-01-17T23:59:59Z
    - SCATTER_GATHER_PERIOD_START=2024-01-01T00:00:00Z
    - SCATTER_GATHER_PERIOD_END=2024-01-17T23:59:59Z
    - PAYMENT_TYPE_PERIOD_START=2022-09-01T00:00:00Z
    - PAYMENT_TYPE_PERIOD_END=2022-09-05T23:59:59Z
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network
  payment_type_router_0:
    build:
      context: .
      dockerfile: cmd/worker/Dockerfile
    container_name: payment_type_router_0
    environment:
    - ID=0
    - WORKER_TYPE=PAYMENT_TYPE_ROUTER
    - MOM_HOST=rabbitmq
    - MOM_PORT=5672
    - INPUT_QUEUE_NAME=payment_type_router_input
    - PAYMENT_TYPE_EXCHANGE_NAME=payment_type_exchange
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
    - money_laundering_network

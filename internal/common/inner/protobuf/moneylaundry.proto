syntax = "proto3";

package protobuf;

option go_package = "tp-lavado-dinero/internal/common/inner/protobuf";

enum MessageType {
    EOF_ = 0;
    TRANSACTION = 1;
    MICROTRANSACTION = 2;
    MAXBANK = 3;
    PERIODFILTER = 4;
    SCATTERGATHER = 5;

    MICROTRANSACTION_RESULT = 6;
    MAXBANK_RESULT = 7;
}

message MoneyLaundry {
    string clientID = 1;
    MessageType type = 2;
    bytes payload = 3;
}
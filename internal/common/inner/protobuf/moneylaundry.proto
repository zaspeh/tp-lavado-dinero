syntax = "proto3";

package protobuf;

option go_package = "tp-lavado-dinero/internal/common/inner/protobuf";

enum MessageType {
    EOF_ = 0;
    TRANSACTION = 1;
    MICROTRANSACTION = 2;
    MAXBANK = 3;
    PERIODFILTER = 4;
    SCATTERGATHER = 5;
    GROUPED_ACCOUNTS_BATCH = 6;
    AVGBYTYPETRANSACTION = 7;
    TO_CONVERT_TRANSACTION = 8;
    TO_CONVERT_PERIOD_FILTERED = 9;
    TO_CONVERT_TYPE_FILTERED_PAYMENT = 10;
    CONVERTED_AMOUNT = 11;

    MICROTRANSACTION_RESULT = 12;
    MAXBANK_RESULT = 13;
    CONVERTED_MICRO_PAYMENT_RESULT = 14;
}

message MoneyLaundry {
    string clientID = 1;
    MessageType type = 2;
    bytes payload = 3;
}
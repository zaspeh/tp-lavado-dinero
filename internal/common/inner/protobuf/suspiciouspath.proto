syntax = "proto3";

package protobuf;

import "account.proto";

option go_package = "tp-lavado-dinero/internal/common/inner/protobuf";

message SuspiciousPath {
  Account origin = 1;
  Account destination = 2;
  uint32 intermediary_count = 3;
}

message SuspiciousPathBatch {
  repeated SuspiciousPath paths = 1;
}
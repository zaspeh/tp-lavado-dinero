syntax = "proto3";

package protobuf;

option go_package = "tp-lavado-dinero/internal/common/inner/protobuf";

import "internal/common/inner/protobuf/protomessages/transaction.proto";
import "internal/common/inner/protobuf/protomessages/conversion.proto";
import "internal/common/inner/protobuf/protomessages/eof.proto";
import "internal/common/inner/protobuf/protomessages/maxbank.proto";
import "internal/common/inner/protobuf/protomessages/microtransaction.proto";
import "internal/common/inner/protobuf/protomessages/periodfilter.proto";
import "internal/common/inner/protobuf/protomessages/avgbytypetransaction.proto";
import "internal/common/inner/protobuf/protomessages/scattergather.proto";
import "internal/common/inner/protobuf/protomessages/intermediarypair.proto";
import "internal/common/inner/protobuf/protomessages/heartbeat.proto";
import "internal/common/inner/protobuf/protomessages/groupedaccountsbatch.proto";

enum MessageType {
    EOF_ = 0;
    TRANSACTION = 1;
    MICROTRANSACTION = 2;
    MAXBANK = 3;
    PERIODFILTER = 4;
    SCATTERGATHER = 5;
    GROUPED_ACCOUNTS_BATCH = 6;
    INTERMEDIARYPAIR = 7;
    AVGBYTYPETRANSACTION = 8;
    TO_CONVERT_TRANSACTION = 9;
    TO_CONVERT_PERIOD_FILTERED = 10;
    TO_CONVERT_TYPE_FILTERED_PAYMENT = 11;
    CONVERTED_AMOUNT = 12;

    MICROTRANSACTION_RESULT = 13;
    MAXBANK_RESULT = 14;
    CONVERTED_MICRO_PAYMENT_RESULT = 15;
    AVGBYTYPE_RESULT = 16;

    AVGBYTYPE_FIRST_PERIOD = 17;
    AVGBYTYPE_SECOND_PERIOD = 18;

    TRANSACTION_BATCH = 19;
    TO_CONVERT_TRANSACTION_BATCH = 20;
    SUSPICIOUS_PATH_BATCH = 21;
    SUSPICIOUS_ACCOUNT_BATCH = 22;
    MAXBANK_BATCH = 23;
    TO_CONVERT_PERIOD_FILTERED_BATCH = 24;
    TO_CONVERT_TYPE_FILTERED_PAYMENT_BATCH = 25;
    CONVERTED_AMOUNT_BATCH = 26;
    MICROTRANSACTION_BATCH = 27;
    PERIOD_FILTER_BATCH = 28;

    CLEANUP = 29;
    AVGBYTYPE_TRANSACTION_BATCH = 30;
    SCATTERGATHER_BATCH = 31;
    INTERMEDIARYPAIR_BATCH = 32;
    MAX_BANK_RESULT_BATCH = 33;

    HEARTBEAT = 34;
}

message MoneyLaundry {
    string clientID = 1;
    MessageType type = 2;
    bytes payload = 3;
    // Se ingresa oneof aparte para que coexista con el resto del sistema
    // la idea es eliminar payload para obtimizar la serializacion
    oneof inner_message {
        TransactionBatch transactions = 4;
        ToConvertTransactionBatch to_convert_batch = 5;
        EOF eof_message = 6;
        MaxBankBatch max_bank_batch = 7;
        ToConvertPeriodFilteredBatch to_convert_period_filtered_batch = 8;
        ToConvertTypeFilteredPaymentBatch to_convert_type_filtered_payment_batch = 9;
        ConvertedAmountBatch converted_amount_batch = 10;
        MicrotransactionBatch microtransactions_batch = 11;
        PeriodFilterBatch period_filter_batch = 12;
        AvgByTypeTransactionBatch avgbytype_transaction_batch = 13;
        ScatterGatherBatch scattergather_batch = 14;
        IntermediaryPairBatch intermediarypair_batch = 15;
        MaxBankResultBatch max_bank_result_batch = 16;
        Heartbeat heartbeat = 17;
        GroupedAccountsBatch grouped_accounts_batch = 18;
    }
}
syntax = "proto3";

package protobuf;

option go_package = "tp-lavado-dinero/internal/common/inner/protobuf";

enum CoordinationMessageType {
  eof_arrived = 0;
  batch_information = 1;
  wakeup = 2;
  cleanup = 3;
}

message EOFCoordination {
  CoordinationMessageType type = 1;
  string client_id = 2;
  uint32 sender_id = 3;
  uint64 expected_total = 4;
  uint32 eof_seen = 5;
  string eofID = 6;
  repeated BatchInformation information = 7;
}

message BatchInformation {
  string batchID = 1;
  uint64 processed_count = 2;
  uint64 survivor_count = 3;
}


syntax = "proto3";

package protobuf;

import "internal/common/inner/protobuf/protomessages/account.proto";

option go_package = "tp-lavado-dinero/internal/common/inner/protobuf";

message GroupedAccounts {
  Account base_account = 1;
  repeated Account related_accounts = 2;
}

message GroupedAccountsBatch {
  repeated GroupedAccounts groups = 1;
}
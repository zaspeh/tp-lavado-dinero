syntax = "proto3";

package protobuf;

option go_package = "tp-lavado-dinero/internal/common/inner/protobuf";

import "google/protobuf/timestamp.proto";

message Transaction {
	string clientID = 1;
	google.protobuf.Timestamp timestamp = 2;
	int32 from_bank = 3;
	int32 to_bank = 4;
	string account = 5;
	string to_account = 6;
	string payment_currency = 7;
	string amount_paid = 8; //	chequear el tipo de este campo.
	string payment_format = 9;
}

message TransactionBatch {
	repeated Transaction transaction = 1;
}
